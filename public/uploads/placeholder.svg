<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1a1008"/>
      <stop offset="1" stop-color="#0d0d0d"/>
    </linearGradient>
    <pattern id="grain" width="140" height="140" patternUnits="userSpaceOnUse">
      <filter id="n">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      </filter>
      <rect width="140" height="140" filter="url(#n)" opacity="0.14"/>
    </pattern>
  </defs>
  <rect width="900" height="1200" fill="url(#g)"/>
  <rect width="900" height="1200" fill="url(#grain)" opacity="0.55"/>
  <rect x="48" y="48" width="804" height="1104" rx="28" fill="none" stroke="rgba(201,168,76,0.35)" stroke-width="3"/>
  <g fill="#F5ECD7" opacity="0.85" font-family="serif">
    <text x="450" y="580" text-anchor="middle" font-size="36" font-weight="700">Portfolio Image</text>
    <text x="450" y="640" text-anchor="middle" font-size="18" opacity="0.8">3:4 Placeholder</text>
  </g>
</svg>

